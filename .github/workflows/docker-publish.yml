# Сборка образа в GitHub Actions → ghcr.io (без next build на прод-сервере).
# На сервере: docker compose pull && docker compose up -d (без --build).

name: Publish and deploy solo-site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: solo-site-docker
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: meta
        run: |
          OWNER_REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${OWNER_REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-demo:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check deploy secrets
        id: deploy-secrets
        env:
          DEMO_SSH_HOST: ${{ secrets.DEMO_SSH_HOST }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
          DEMO_SSH_USER: ${{ secrets.DEMO_SSH_USER }}
          DEMO_SSH_KEY: ${{ secrets.DEMO_SSH_KEY }}
        run: |
          echo "port=${DEMO_SSH_PORT:-22}" >> "$GITHUB_OUTPUT"

          if [ -n "$DEMO_SSH_HOST" ] && [ -n "$DEMO_SSH_USER" ] && [ -n "$DEMO_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH agent
        if: steps.deploy-secrets.outputs.enabled == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEMO_SSH_KEY }}

      - name: Add VPS to known_hosts
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ steps.deploy-secrets.outputs.port }}" "${{ secrets.DEMO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy demo over SSH
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          ssh \
            -p "${{ steps.deploy-secrets.outputs.port }}" \
            "${{ secrets.DEMO_SSH_USER }}@${{ secrets.DEMO_SSH_HOST }}" \
            /opt/beget/n8n/solo-site/scripts/deploy-demo.sh

      - name: Skip deploy when SSH secrets are missing
        if: steps.deploy-secrets.outputs.enabled != 'true'
        run: echo "Skipping deploy-demo because required SSH secrets are not configured."
