# Сборка образа в GitHub Actions → ghcr.io (без next build на прод-сервере).
# На сервере: docker compose pull && docker compose up -d (без --build).

name: Publish and deploy solo-site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: solo-site-docker
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: meta
        run: |
          OWNER_REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${OWNER_REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-demo:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.DEMO_SSH_HOST != '' && secrets.DEMO_SSH_USER != '' && secrets.DEMO_SSH_KEY != '' }}
    steps:
      - name: Deploy demo over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEMO_SSH_HOST }}
          port: ${{ secrets.DEMO_SSH_PORT || '22' }}
          username: ${{ secrets.DEMO_SSH_USER }}
          key: ${{ secrets.DEMO_SSH_KEY }}
          script: /opt/beget/n8n/solo-site/scripts/deploy-demo.sh
